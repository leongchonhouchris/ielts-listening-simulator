<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTS Listening – Practice Test</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Loading overlay -->
  <div class="spinner-overlay" id="loading">
    <div class="spinner"></div>
    <div style="color:#555;font-size:0.95rem;">Loading test…</div>
  </div>

  <!-- ── TOP BAR ─────────────────────────────────────────────── -->
  <div id="sim-topbar" class="hidden">
    <div class="tb-logo">IELTS <span>Listening</span></div>
    <div class="tb-title" id="tb-test-title"></div>
    <div class="tb-right">
      <div id="timer-display">30:00</div>
      <button class="btn btn-ghost btn-sm" id="btn-review" style="color:#cce0ff;border-color:#7db8f7;">Review</button>
      <button class="btn btn-danger btn-sm" id="btn-submit">Submit</button>
    </div>
  </div>

  <!-- ── AUDIO STATUS BAR ────────────────────────────────────── -->
  <div id="audio-bar" class="hidden">
    <span class="audio-icon" id="audio-icon">&#9654;</span>
    <span id="audio-status-text">Loading audio…</span>
    <span class="audio-mode-badge" id="audio-mode-badge"></span>
    <!-- Hidden audio element (browser mode only) -->
    <audio id="audio-player" preload="auto" style="display:none;"></audio>
  </div>

  <!-- ── SECTION TAB BAR ─────────────────────────────────────── -->
  <div id="section-nav" class="hidden">
    <!-- Section tabs injected by JS -->
  </div>

  <!-- ── QUESTION PANE ───────────────────────────────────────── -->
  <div id="sim-body" class="hidden">
    <!-- Questions injected by JS -->
  </div>

  <!-- ── REVIEW PANEL ────────────────────────────────────────── -->
  <div id="review-panel" class="hidden">
    <h4>Question Review</h4>
    <div id="review-content"><!-- Injected by JS --></div>
  </div>

  <!-- ── TRANSFER TIME OVERLAY ───────────────────────────────── -->
  <div id="transfer-overlay" class="hidden">
    <h2>Audio has ended</h2>
    <p>You now have 2 minutes to check and transfer your answers.<br>The test will submit automatically when the time expires.</p>
    <div id="transfer-countdown">2:00</div>
    <button class="btn btn-primary submit-early-btn" id="btn-submit-early">Submit Now</button>
  </div>

  <!-- ── SUBMIT MODAL ────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="submit-modal-overlay">
    <div class="modal">
      <h2>Submit Test</h2>
      <p id="submit-modal-body"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="submit-cancel">Go Back</button>
        <button class="btn btn-primary" id="submit-confirm">Submit Now</button>
      </div>
    </div>
  </div>

  <!-- ── RESULTS PAGE ─────────────────────────────────────────── -->
  <div id="results-wrapper" class="hidden">
    <div id="results-page">
      <div class="results-header">
        <h1>Test Complete</h1>
        <div class="band-badge" id="res-band">—</div>
        <div class="score-line" id="res-score">— / 40 correct</div>
        <div style="font-size:0.85rem;color:var(--text-muted);margin-top:6px;" id="res-time"></div>
      </div>
      <div id="results-sections"><!-- Per-section result tables injected by JS --></div>
    </div>
  </div>

  <script type="module" src="js/simulator.js"></script>
</body>
</html>
